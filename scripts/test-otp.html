<!DOCTYPE html>
<html><head><title>Sign in to Second Thoughts</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 80px auto; }
  h1 { font-size: 28px; }
  h2 { font-size: 22px; }
  p { font-size: 16px; color: #333; line-height: 1.6; }
  .otp-container { display: flex; gap: 12px; margin: 30px 0; }
  .otp-wrapper { /* React-style wrapper div */ }
  .otp-wrapper input {
    width: 48px; height: 56px; text-align: center; font-size: 24px;
    border: 1px solid #ddd; border-radius: 8px; outline: none;
  }
  .otp-wrapper input:focus { border-color: #f60; }
</style>
</head><body>
  <h1>Sign in to Second Thoughts</h1>
  <h2>Check your email</h2>
  <p>If you have an account with us, we've sent an email to
     <b>test@example.com</b>. Click the link inside or enter the code below.</p>
  <div class="otp-container">
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
    <div class="otp-wrapper"><input type="text" inputmode="numeric" autocomplete="off"></div>
  </div>
  <p>You can also <a href="#">try again</a> or <a href="#">sign in using your password</a>.</p>
</body></html>
